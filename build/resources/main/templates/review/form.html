<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>후기 작성</title>
    <link rel="stylesheet" th:href="@{/css/common.css}" />
  </head>
  <body>
    <div th:replace="~{fragments/header :: header}"></div>
    <main class="container narrow">
      <h1>후기 작성</h1>
      <p th:text="${trade.productPost.title}"></p>
      <form
        th:action="@{/review/form/{id}(id=${trade.id})}"
        th:object="${reviewRequestDto}"
        method="post"
        class="form"
      >
        <select th:field="*{rating}">
          <option value="5">5점</option>
          <option value="4">4점</option>
          <option value="3">3점</option>
          <option value="2">2점</option>
          <option value="1">1점</option></select
        ><textarea th:field="*{content}" placeholder="후기 내용"></textarea
        ><button class="btn" type="submit">등록</button>
      </form>
    </main>
  </body>
</html>
