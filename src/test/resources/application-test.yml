spring:
  datasource:
    url: jdbc:h2:mem:neighbortrade-test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: false

app:
  seed:
    enabled: false
  postgis:
    enabled: false
  db:
    postgres-sequence-sync: false

logging:
  level:
    root: warn
