spring:
  application:
    name: NeighborTrade
  # 로컬: application-secret.yml(gitignore). Railway: Variables에 동일 키 등록
  config:
    import: optional:classpath:application-secret.yml
  thymeleaf:
    cache: false
  servlet:
    multipart:
      max-file-size: ${MAX_FILE_SIZE:5MB}
      max-request-size: ${MAX_REQUEST_SIZE:20MB}
  datasource:
    url: ${DB_URL:jdbc:h2:mem:neighbortrade;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10

  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:true}
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    # 로컬 기본 true — Railway·운영은 application-prod.yml(prod 프로필)에서 false
    show-sql: ${SHOW_SQL:true}
    database-platform: ${DB_DIALECT:org.hibernate.dialect.H2Dialect}
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

  output:
    ansi:
      enabled: always

  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/kakao"
            scope:
              - profile_nickname
              - profile_image
              - account_email
            client-name: Kakao
          naver:
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/naver"
            scope:
              - name
              - email
              - profile_image
            client-name: Naver
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

server:
  port: ${PORT:8080}
  # Railway 등 리버스 프록시 뒤에서 {baseUrl}·OAuth redirect-uri가 https로 잡히도록
  forward-headers-strategy: framework

logging:
  level:
    # 20260515금 관리자메뉴 구현에서 이메일 마스킹 보안 로그정책 로그에도 적용
    # 로컬 기본 debug — Railway·운영은 application-prod.yml(prod)에서 warn/info
    # Hibernate SQL(debug): 쿼리 텍스트만. JDBC 바인드(trace)는 물음표에 들어가는 값(이메일 등)이 로그에 그대로 남을 수 있음.
    # 운영·공유 로그에서는 바인드를 trace로 두지 말 것. 로컬에서만 필요 시 환경변수로 상향: HIBERNATE_BIND_LOG=trace
    org.hibernate.SQL: ${HIBERNATE_SQL_LOG:debug}
    org.hibernate.orm.jdbc.bind: ${HIBERNATE_BIND_LOG:warn}
    # org.hibernate.SQL: debug
    # org.hibernate.orm.jdbc.bind: trace
  pattern:
    # prod 프로필: ANSI 제거·스택트레이스 축약(application-prod.yml)
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(%5p) %clr(${PID:- }){magenta} %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n${LOG_EXCEPTION_CONVERSION_WORD:-%wEx}"

app:
  ui:
    # CSS/JS 쿼리 버전 — 배포 후 모바일 브라우저 캐시 갱신용
    asset-version: ${APP_UI_ASSET_VERSION:20260529-s8-qa}
  market:
    popular-keywords:
      - 에어컨
      - 자전거
      - 아이폰
      - 컴퓨터
      - 크록스
      - 노트북
  db:
    # PostgreSQL·Supabase(호스팅 PostgreSQL, jdbc:postgresql URL) 기동 시 IDENTITY 시퀀스를 MAX(id)에 맞춤. 필요 없으면 false.
    postgres-sequence-sync: ${POSTGRES_SEQUENCE_SYNC:true}
  seed:
    enabled: ${APP_SEED_ENABLED:true}
  upload:
    dir: ${UPLOAD_DIR:uploads}
  postgis:
    enabled: ${POSTGIS_ENABLED:false}
