<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title th:text="${post.title}">동네생활</title>
  <link rel="stylesheet" th:href="@{/css/common.css(v=${@environment.getProperty('app.ui.asset-version')})}" />
</head>
<body class="community-detail-page">
<!-- body.community-detail-page — Phase 3 Step 6(COM) v2 shell (20260611) -->
<div th:replace="~{fragments/header :: header}"></div>

<!-- PC v2 (≥768px) — Phase 3 Step 6(COM): search band + community-detail-v2 패널 (20260611) -->
<div class="market-v2-pc-only">
  <div class="market-v2-shell">
    <div th:replace="~{fragments/community-search-band :: community-search-band}"></div>

    <article class="community-detail-v2">
      <header class="community-detail-v2__head">
        <p class="community-detail-v2__meta">
              <span
                      th:text="${post.neighborhood.emdName}"
                      th:classappend="${browsingNeighborhoodId != null and browsingNeighborhoodId == post.neighborhood.id} ? ' community-detail-v2__meta-focus' : ''"
              >동네</span
              >
          ·
          <span th:text="${post.author.nickname}">작성자</span>
          ·
          <time th:text="${@relativeTime.communityMeta(post)}">시간</time>
          · 조회 <span th:text="${post.viewCount}">0</span>
        </p>
        <h1 class="community-detail-v2__title" th:text="${post.title}">제목</h1>
      </header>

      <div class="community-detail-v2__content" th:text="${post.content}">본문</div>

      <div class="community-detail-v2__actions">
        <a
                class="btn secondary"
                sec:authorize="isAuthenticated()"
                th:if="${currentMember != null and post.author.id == currentMember.id}"
                th:href="@{/community/edit/{id}(id=${post.id})}"
        >수정</a
        >
        <a class="btn danger" th:href="@{/reports/community_post/{id}(id=${post.id})}">신고</a>
        <a class="btn secondary community-detail-v2__back" th:href="@{/community/list}">목록</a>
      </div>

      <!-- Step 2(C1): anonymous 댓글 CTA / authenticated 폼 분기 (20260609) -->
      <section class="community-detail-v2__comments panel">
        <h2 class="community-detail-v2__comments-title">댓글</h2>
        <div class="community-detail-v2__comment-list">
          <div class="community-detail-v2__comment" th:each="comment : ${comments}">
            <div class="community-detail-v2__comment-body">
              <b th:text="${comment.author.nickname}">작성자</b>
              <span th:text="${comment.content}">댓글</span>
            </div>
            <form
                    sec:authorize="isAuthenticated()"
                    th:if="${currentMember != null and comment.author.id == currentMember.id}"
                    th:action="@{/community/comment/delete/{id}(id=${comment.id})}"
                    method="post"
                    class="community-detail-v2__comment-delete"
            >
              <input type="hidden" name="postId" th:value="${post.id}" />
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
              <button class="btn danger" type="submit">삭제</button>
            </form>
          </div>
          <p class="muted" th:if="${#lists.isEmpty(comments)}">아직 댓글이 없습니다.</p>
        </div>

        <p class="muted community-detail-v2__login-cta" sec:authorize="isAnonymous()">
          <a th:href="@{/member/login}">로그인</a> 후 댓글을 작성할 수 있습니다.
        </p>
        <form
                sec:authorize="isAuthenticated()"
                th:action="@{/community/comment/{id}(id=${post.id})}"
                th:object="${commentDto}"
                method="post"
                class="form community-detail-v2__comment-form"
        >
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
          <input th:field="*{content}" placeholder="댓글을 입력하세요" />
          <button class="btn" type="submit">댓글 등록</button>
        </form>
      </section>
    </article>
  </div>
</div>

<!-- mobile (≤767px) — Step 2(C1) v1 유지; PC만 v2 (20260609, Step 6 20260611) -->
<main class="container market-v2-mobile-only community-detail-mobile detail">
  <h1 th:text="${post.title}"></h1>
  <p
          class="muted"
          th:text="${post.neighborhood.emdName} + ' · ' + ${post.author.nickname} + ' · ' + ${@relativeTime.communityMeta(post)} + ' · 조회 ' + ${post.viewCount}"
  ></p>
  <p class="content" th:text="${post.content}"></p>
  <div class="actions">
    <a
            class="btn secondary"
            sec:authorize="isAuthenticated()"
            th:if="${currentMember != null and post.author.id == currentMember.id}"
            th:href="@{/community/edit/{id}(id=${post.id})}"
    >수정</a
    >
    <a class="btn danger" th:href="@{/reports/community_post/{id}(id=${post.id})}">신고</a>
    <a class="btn secondary" th:href="@{/community/list}">목록</a>
  </div>
  <section class="panel">
    <h2>댓글</h2>
    <div class="list">
      <div class="row" th:each="comment : ${comments}">
        <span><b th:text="${comment.author.nickname}"></b> <span th:text="${comment.content}"></span></span>
        <form
                sec:authorize="isAuthenticated()"
                th:if="${currentMember != null and comment.author.id == currentMember.id}"
                th:action="@{/community/comment/delete/{id}(id=${comment.id})}"
                method="post"
        >
          <input type="hidden" name="postId" th:value="${post.id}" />
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
          <button class="btn danger" type="submit">삭제</button>
        </form>
      </div>
    </div>
    <p class="muted" sec:authorize="isAnonymous()">
      <a th:href="@{/member/login}">로그인</a> 후 댓글을 작성할 수 있습니다.
    </p>
    <form
            sec:authorize="isAuthenticated()"
            th:action="@{/community/comment/{id}(id=${post.id})}"
            th:object="${commentDto}"
            method="post"
            class="form"
    >
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
      <input th:field="*{content}" placeholder="댓글을 입력하세요" />
      <button class="btn" type="submit">댓글 등록</button>
    </form>
  </section>
</main>
</body>
</html>
