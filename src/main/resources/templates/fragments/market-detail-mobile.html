<th:block
        th:fragment="market-detail-mobile"
        xmlns:th="http://www.thymeleaf.org"
        xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
    <main class="market-v2-mobile-only market-detail-mobile">
        <p class="error market-detail-mobile__flash" th:if="${errorMessage}" th:text="${errorMessage}"></p>
        <p class="success market-detail-mobile__flash" th:if="${successMessage}" th:text="${successMessage}"></p>

        <div class="market-detail-mobile__gallery">
            <img
                    id="detail-mobile-main-image"
                    class="market-detail-mobile__main-image"
                    th:src="${post.displayImageUrl}"
                    alt="상품"
            />
            <div class="market-detail-mobile__thumbs" th:if="${!#lists.isEmpty(images)}">
                <button
                        type="button"
                        class="market-detail-mobile__thumb"
                        th:each="image, stat : ${images}"
                        th:attr="data-src=${image.imageUrl}"
                        th:classappend="${stat.first} ? ' is-active' : ''"
                        th:aria-label="'사진 ' + ${stat.count}"
                >
                    <img th:src="${image.imageUrl}" alt="" />
                </button>
            </div>
        </div>

        <div class="market-detail-mobile__body">
            <p class="market-detail-mobile__meta">
                <span th:text="${post.category.label}">카테고리</span>
                ·
                <span
                        th:text="${post.neighborhood.emdName}"
                        th:classappend="${browsingNeighborhoodId != null and browsingNeighborhoodId == post.neighborhood.id} ? ' market-detail-mobile__meta-focus' : ''"
                >동네</span
                >
                ·
                <time th:text="${@relativeTime.productMeta(post)}">시간</time>
            </p>
            <h1 class="market-detail-mobile__title" th:text="${post.title}">제목</h1>
            <p
                    class="market-detail-mobile__price"
                    th:text="${post.giveaway ? '나눔' : #numbers.formatInteger(post.price, 0, 'COMMA') + '원'}"
            >
                0원
            </p>
            <p class="market-detail-mobile__stats">
                <span th:text="${post.status.label}">판매중</span>
                · 조회 <span th:text="${post.viewCount}">0</span>
            </p>

            <section class="market-detail-mobile__seller">
                <div class="market-detail-mobile__seller-row">
                    <span class="market-detail-mobile__seller-name" th:text="${post.seller.nickname}">판매자</span>
                    <span class="market-detail-mobile__seller-manner" th:text="${post.seller.mannerScore} + '°C'"
                    >40°C</span
                    >
                </div>
            </section>

            <dl class="market-detail-mobile__attrs">
                <div class="market-detail-mobile__attr" th:if="${post.tradePlace}">
                    <dt>거래 장소</dt>
                    <dd th:text="${post.tradePlace}">장소</dd>
                </div>
                <div class="market-detail-mobile__attr">
                    <dt>동네</dt>
                    <dd th:text="${post.neighborhood.displayName}">동네</dd>
                </div>
            </dl>

            <section class="market-detail-mobile__content">
                <h2 class="market-detail-mobile__content-title">상품 설명</h2>
                <p class="market-detail-mobile__content-body" th:text="${post.content}">설명</p>
            </section>

            <div
                    class="market-detail-mobile__seller-panel"
                    th:if="${currentMember != null && currentMember.id == post.seller.id}"
            >
                <a class="btn secondary" th:href="@{/market/edit/{id}(id=${post.id})}">수정</a>
                <form th:if="${canBump}" th:action="@{/market/bump/{id}(id=${post.id})}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button class="btn secondary" type="submit">끌올</button>
                </form>
                <form th:action="@{/market/status/{id}(id=${post.id})}" method="post" class="market-detail-mobile__status-form">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <select name="status" class="market-detail-mobile__status-select">
                        <option
                                th:each="s : ${T(com.study.neighbortrade.domain.product.ProductStatus).values()}"
                                th:value="${s}"
                                th:text="${s.label}"
                                th:selected="${s == post.status}"
                        ></option>
                    </select>
                    <button class="btn secondary" type="submit">상태 변경</button>
                </form>
                <p
                        class="muted market-detail-mobile__bump-hint"
                        th:if="${!canBump}"
                        th:text="'끌올은 ' + ${bumpCooldownHours} + '시간 후에 다시 할 수 있습니다.'"
                ></p>
            </div>
        </div>

        <div
                class="market-detail-mobile__sticky"
                th:if="${currentMember == null || currentMember.id != post.seller.id}"
        >
            <a
                    sec:authorize="isAnonymous()"
                    class="market-detail-mobile__sticky-btn market-detail-mobile__sticky-btn--icon"
                    th:href="@{/member/login}"
                    aria-label="로그인 후 찜하기"
            >♡</a
            >
            <form
                    sec:authorize="isAuthenticated()"
                    th:if="${currentMember != null && currentMember.id != post.seller.id}"
                    th:action="@{/market/favorite/{id}(id=${post.id})}"
                    method="post"
                    class="market-detail-mobile__sticky-form"
            >
                <input type="hidden" name="redirect" th:value="${currentRedirect}" />
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <button
                        type="submit"
                        class="market-detail-mobile__sticky-btn market-detail-mobile__sticky-btn--icon"
                        th:classappend="${isFavorited} ? ' is-favorited' : ''"
                        th:text="${isFavorited} ? '♥' : '♡'"
                >
                    ♡
                </button>
            </form>
            <form
                    th:if="${currentMember != null && currentMember.id != post.seller.id}"
                    th:action="@{/chat/start/{id}(id=${post.id})}"
                    method="post"
                    class="market-detail-mobile__sticky-form market-detail-mobile__sticky-form--grow"
            >
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <button class="btn market-detail-mobile__sticky-primary" type="submit">채팅하기</button>
            </form>
            <form
                    th:if="${currentMember != null && currentMember.id != post.seller.id}"
                    th:action="@{/trade/request/{id}(id=${post.id})}"
                    method="post"
                    class="market-detail-mobile__sticky-form market-detail-mobile__sticky-form--grow"
            >
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <button class="btn secondary market-detail-mobile__sticky-secondary" type="submit">거래 요청</button>
            </form>
            <a
                    class="market-detail-mobile__sticky-btn market-detail-mobile__sticky-btn--report"
                    th:if="${currentMember != null && currentMember.id != post.seller.id}"
                    th:href="@{/reports/product_post/{id}(id=${post.id})}"
            >신고</a
            >
        </div>
    </main>
</th:block>
