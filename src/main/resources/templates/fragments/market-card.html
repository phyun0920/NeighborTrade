<th:block
        th:fragment="market-card(post, favoritedPostIds, browsingNeighborhoodId)"
        xmlns:th="http://www.thymeleaf.org"
        xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
    <article
            class="market-card"
            th:with="isFavorited=${(favoritedPostIds != null and favoritedPostIds.contains(post.id)) or (allFavorites != null and allFavorites)}"
            th:classappend="${browsingNeighborhoodId != null and post.neighborhood != null and browsingNeighborhoodId == post.neighborhood.id} ? ' market-card--browse-focus' : ''"
    >
        <a class="card market-card__link" th:href="@{/market/detail/{id}(id=${post.id})}">
            <img th:src="${post.displayImageUrl}" alt="상품" />
            <b th:text="${post.title}"></b>
            <span
                    th:text="${post.giveaway ? '나눔' : #numbers.formatInteger(post.price, 0, 'COMMA') + '원'}"
            ></span>
            <small
                    th:text="${post.neighborhood.emdName} + ' · ' + ${@relativeTime.productMeta(post)}"
            ></small>
        </a>
        <form
                sec:authorize="isAuthenticated()"
                class="card__favorite-form"
                th:action="@{/market/favorite/{id}(id=${post.id})}"
                method="post"
        >
            <input type="hidden" name="redirect" th:value="${currentRedirect}" />
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <button
                    type="submit"
                    class="card__favorite"
                    th:classappend="${isFavorited} ? ' is-favorited' : ''"
                    th:attr="aria-label=${isFavorited} ? '찜 해제' : '찜하기'"
                    th:text="${isFavorited} ? '♥' : '♡'"
            >
                ♡
            </button>
        </form>
        <a
                sec:authorize="isAnonymous()"
                class="card__favorite card__favorite--login"
                th:href="@{/member/login}"
                aria-label="로그인 후 찜하기"
        >♡</a
        >
    </article>
</th:block>
