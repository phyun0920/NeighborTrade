<!DOCTYPE html>
<html
        xmlns:th="http://www.thymeleaf.org"
        th:fragment="layout(title, content)"
        th:lang="ko"
>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title th:text="${title}">관리자</title>
    <link rel="stylesheet" th:href="@{/css/common.css}" />
</head>
<body class="admin-body">
<div th:replace="~{fragments/header :: header}"></div>

<div class="admin-shell" id="admin-shell">
    <button
            type="button"
            class="admin-menu-toggle"
            id="admin-menu-toggle"
            aria-controls="admin-sidebar"
            aria-expanded="false"
            aria-label="관리자 메뉴 열기"
    >
        <span class="admin-menu-toggle-bars" aria-hidden="true"></span>
        <span class="admin-menu-toggle-text">메뉴</span>
    </button>

    <div
            class="admin-sidebar-backdrop"
            id="admin-sidebar-backdrop"
            hidden
            aria-hidden="true"
    ></div>

    <aside class="admin-sidebar" id="admin-sidebar" aria-label="관리자 메뉴">
        <div class="admin-sidebar-head">관리자</div>
        <nav class="admin-sidebar-nav">
            <a
                    th:href="@{/admin/dashboard}"
                    th:classappend="${adminActiveMenu == 'dashboard'} ? ' is-active'"
            >대시보드</a
            >
            <a
                    th:href="@{/admin/members}"
                    th:classappend="${adminActiveMenu == 'members'} ? ' is-active'"
            >회원관리</a
            >
            <a
                    th:href="@{/admin/posts}"
                    th:classappend="${adminActiveMenu == 'posts'} ? ' is-active'"
            >판매글관리</a
            >
            <a
                    th:href="@{/admin/neighborhoods}"
                    th:classappend="${adminActiveMenu == 'neighborhoods'} ? ' is-active'"
            >동네관리</a
            >
            <a
                    th:href="@{/admin/reports}"
                    th:classappend="${adminActiveMenu == 'reports'} ? ' is-active'"
            >신고관리</a
            >
        </nav>
    </aside>

    <div class="admin-main">
        <th:block th:replace="${content}" />
    </div>
</div>

<script th:src="@{/js/admin-layout.js}" defer></script>
</body>
</html>
