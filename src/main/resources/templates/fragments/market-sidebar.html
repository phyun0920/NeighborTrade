<th:block th:fragment="market-sidebar" xmlns:th="http://www.thymeleaf.org">
    <aside class="market-sidebar" aria-label="필터">
        <div class="market-sidebar__head">
            <a class="market-sidebar__reset" th:href="@{/market/list}">초기화</a>
        </div>

        <section class="market-sidebar__section">
            <h2 class="market-sidebar__title">거래 상태</h2>
            <ul class="market-sidebar__list">
                <li>
                    <a
                            th:href="@{/market/list(page=0, keyword=${keyword}, size=8, sort=${sort}, view=${view}, category=${selectedCategory}, neighborhoodId=${neighborhoodId})}"
                            th:classappend="${!onlyOnSale} ? ' is-active' : ''"
                    >전체</a
                    >
                </li>
                <li>
                    <a
                            th:href="@{/market/list(page=0, keyword=${keyword}, onlyOnSale=true, size=8, sort=${sort}, view=${view}, category=${selectedCategory}, neighborhoodId=${neighborhoodId})}"
                            th:classappend="${onlyOnSale} ? ' is-active' : ''"
                    >거래 가능만</a
                    >
                </li>
            </ul>
        </section>

        <section class="market-sidebar__section">
            <h2 class="market-sidebar__title">카테고리</h2>
            <ul class="market-sidebar__list market-sidebar__list--scroll">
                <li>
                    <a
                            th:href="@{/market/list(page=0, keyword=${keyword}, onlyOnSale=${onlyOnSale}, size=8, sort=${sort}, view=${view}, neighborhoodId=${neighborhoodId})}"
                            th:classappend="${selectedCategory == null} ? ' is-active' : ''"
                    >전체</a
                    >
                </li>
                <li th:each="cat : ${categories}">
                    <a
                            th:href="@{/market/list(page=0, keyword=${keyword}, onlyOnSale=${onlyOnSale}, category=${cat}, size=8, sort=${sort}, view=${view}, neighborhoodId=${neighborhoodId})}"
                            th:classappend="${selectedCategory == cat} ? ' is-active' : ''"
                            th:text="${cat.label}"
                    >카테고리</a
                    >
                </li>
            </ul>
        </section>

        <section class="market-sidebar__section">
            <h2 class="market-sidebar__title">위치</h2>
            <p class="market-sidebar__location-hint" th:if="${selectedNeighborhood != null}">
                목록 필터:
                <strong th:text="${selectedNeighborhood.emdName}">동</strong>
            </p>
            <p
                    class="market-sidebar__location-hint"
                    th:if="${selectedNeighborhood == null and browsingNeighborhood != null}"
            >
                열람 동네:
                <strong th:text="${browsingNeighborhood.emdName}">동</strong>
                · 카드 테두리 강조
            </p>
            <p
                    class="market-sidebar__location-hint"
                    th:if="${selectedNeighborhood == null and browsingNeighborhood == null}"
            >
                동네를 선택하면 해당 동네 글이 강조됩니다.
            </p>
            <ul class="market-sidebar__list market-sidebar__list--radio">
                <li>
                    <a
                            class="market-sidebar__radio"
                            th:href="@{/market/list(page=0, keyword=${keyword}, onlyOnSale=${onlyOnSale}, category=${selectedCategory}, size=8, sort=${sort}, view=${view})}"
                            th:classappend="${neighborhoodId == null} ? ' is-active' : ''"
                    >전체 동네</a
                    >
                </li>
            </ul>
            <th:block th:each="group : ${neighborhoodFilterGroups}">
                <p class="market-sidebar__group-label" th:text="${group.label}">서울특별시 금천구</p>
                <ul
                        class="market-sidebar__list market-sidebar__list--radio market-sidebar__list--scroll"
                        th:attr="aria-label=${group.label} + ' 동네 목록'"
                >
                    <li th:each="n : ${group.neighborhoods}">
                        <a
                                class="market-sidebar__radio"
                                th:href="@{/market/list(page=0, keyword=${keyword}, onlyOnSale=${onlyOnSale}, category=${selectedCategory}, neighborhoodId=${n.id}, size=8, sort=${sort}, view=${view})}"
                                th:classappend="${neighborhoodId != null and neighborhoodId == n.id} ? ' is-active' : ''"
                                th:text="${n.emdName}"
                        >동</a
                        >
                    </li>
                </ul>
            </th:block>
            <button
                    type="button"
                    class="btn secondary market-sidebar__region-btn js-region-chip-open"
                    aria-haspopup="dialog"
                    aria-controls="region-modal"
            >
                열람 동네 변경
            </button>
        </section>
    </aside>
</th:block>
