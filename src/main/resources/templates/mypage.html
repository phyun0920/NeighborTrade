<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>마이페이지</title>
  <link rel="stylesheet" th:href="@{/css/common.css}" />
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<main class="container">
  <h1>마이페이지</h1>
  <section class="panel">
    <p th:text="'닉네임: ' + ${currentMember.nickname}"></p>
    <p th:text="'이메일: ' + ${currentMember.email}"></p>
    <p th:text="'매너점수: ' + ${currentMember.mannerScore}"></p>
    <p
            th:text="${currentMember.localVerified ? '인증 동네: ' + currentMember.verifiedNeighborhood.displayName : '동네 인증이 필요합니다'}"
    ></p>
  </section>
  <div class="actions">
    <a class="btn" th:href="@{/market/my}">내 판매글</a
    ><a class="btn secondary" th:href="@{/trade/list}">내 거래</a
  ><a class="btn secondary" th:href="@{/review/my}">받은 후기</a>
  </div>
  <form
          th:action="@{/member/logout}"
          method="post"
          class="mypage-logout-form"
  >
    <input
            type="hidden"
            th:name="${_csrf.parameterName}"
            th:value="${_csrf.token}"
    />
    <button type="submit" class="btn secondary mypage-logout-btn">
      로그아웃
    </button>
  </form>
</main>
</body>
</html>
