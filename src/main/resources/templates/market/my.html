<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>내 판매글</title>
  <link rel="stylesheet" th:href="@{/css/common.css(v=${@environment.getProperty('app.ui.asset-version')})}" />
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<main class="container">
  <h1>내가 올린 판매글</h1>
  <p class="success" th:if="${successMessage}" th:text="${successMessage}"></p>
  <p class="error" th:if="${errorMessage}" th:text="${errorMessage}"></p>
  <div class="list">
    <div class="row market-my-row" th:each="post : ${page.content}">
      <a th:href="@{/market/detail/{id}(id=${post.id})}" class="market-my-row__link">
            <span>
              <b th:text="${post.title}"></b><br />
              <small
                      th:text="${post.neighborhood.emdName} + ' · ' + ${@relativeTime.productMeta(post)} + ' · ' + ${post.status.label}"
              ></small>
            </span>
        <b th:text="${post.status.label}"></b>
      </a>
      <form
              th:if="${@productPostService.canBump(post)}"
              th:action="@{/market/bump/{id}(id=${post.id})}"
              method="post"
              class="market-my-row__bump"
      >
        <input type="hidden" name="redirect" value="/market/my" />
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <button class="btn secondary" type="submit">끌올</button>
      </form>
    </div>
  </div>
</main>
</body>
</html>
