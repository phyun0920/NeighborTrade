<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>중고거래</title>
    <link rel="stylesheet" th:href="@{/css/common.css}" />
  </head>
  <body>
    <div th:replace="~{fragments/header :: header}"></div>
    <main class="container">
      <div class="page-head">
        <h1
          th:text="${currentMember != null && currentMember.localVerified ? currentMember.verifiedNeighborhood.displayName + ' 중고거래' : '중고거래'}"
        >
          중고거래
        </h1>
        <a class="btn" th:href="@{/market/form}">글쓰기</a>
      </div>
      <form class="filters" th:action="@{/market/list}" method="get">
        <input
          name="keyword"
          th:value="${keyword}"
          placeholder="검색어"
        /><label
          ><input
            type="checkbox"
            name="onlyOnSale"
            value="true"
            th:checked="${onlyOnSale}"
          />
          거래 가능만 보기</label
        ><button class="btn secondary" type="submit">검색</button>
      </form>
      <div class="grid">
        <a
          class="card"
          th:each="post : ${page.content}"
          th:href="@{/market/detail/{id}(id=${post.id})}"
          ><img th:src="${post.displayImageUrl}" alt="상품" /><b
            th:text="${post.title}"
          ></b
          ><span
            th:text="${post.giveaway ? '나눔' : #numbers.formatInteger(post.price, 0, 'COMMA') + '원'}"
          ></span
          ><small
            th:text="${post.neighborhood.emdName} + ' · ' + ${post.status.label}"
          ></small
        ></a>
      </div>
    </main>
  </body>
</html>
