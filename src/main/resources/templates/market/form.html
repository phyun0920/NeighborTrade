<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>판매글 작성</title>
  <link rel="stylesheet" th:href="@{/css/common.css}" />
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<main class="container narrow">
  <h1>판매글 작성</h1>
  <p th:unless="${currentMember.localVerified}" class="error">
    동네 인증 후 글을 작성할 수 있습니다.
  </p>
  <form
          th:if="${currentMember.localVerified}"
          th:action="@{/market/form}"
          th:object="${productPostRequestDto}"
          method="post"
          enctype="multipart/form-data"
          class="form"
  >
    <input th:field="*{title}" placeholder="제목" /><select
          th:field="*{category}"
  >
    <option
            th:each="c : ${categories}"
            th:value="${c}"
            th:text="${c.label}"
    ></option></select
  ><input th:field="*{price}" type="number" placeholder="가격" /><label
  ><input th:field="*{giveaway}" type="checkbox" /> 나눔</label
  ><input
          th:field="*{representativeImageUrl}"
          placeholder="대표 이미지 URL(선택, 파일 업로드 우선)"
  /><input
          name="imageFiles"
          type="file"
          accept="image/*"
          multiple
  /><small class="muted">jpg, png, gif, webp 이미지를 여러 장 업로드할 수 있습니다.</small
  ><input
          th:field="*{tradePlace}"
          placeholder="거래 희망 장소"
  /><textarea th:field="*{content}" placeholder="상품 설명"></textarea
  ><button class="btn" type="submit">등록</button>
  </form>
</main>
</body>
</html>
