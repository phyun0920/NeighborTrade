<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title th:text="${post.title}">상세</title>
  <link rel="stylesheet" th:href="@{/css/common.css(v=${@environment.getProperty('app.ui.asset-version', '1')})}" />
</head>
<body class="market-detail-page">
<div th:replace="~{fragments/header :: header}"></div>

<!-- PC v2 (≥768px) -->
<div class="market-v2-pc-only">
  <div class="market-v2-shell">
    <div th:replace="~{fragments/market-search-band :: market-search-band}"></div>

    <p class="error market-detail-v2__error" th:if="${errorMessage}" th:text="${errorMessage}"></p>
    <p class="success market-detail-v2__success" th:if="${successMessage}" th:text="${successMessage}"></p>

    <article class="market-detail-v2">
      <div class="market-detail-v2__layout">
        <div class="market-detail-v2__gallery">
          <img
                  id="detail-main-image"
                  class="market-detail-v2__main-image"
                  th:src="${post.displayImageUrl}"
                  alt="상품"
          />
          <div class="market-detail-v2__thumbs" th:if="${!#lists.isEmpty(images)}">
            <button
                    type="button"
                    class="market-detail-v2__thumb"
                    th:each="image, stat : ${images}"
                    th:attr="data-src=${image.imageUrl}"
                    th:classappend="${stat.first} ? ' is-active' : ''"
                    th:aria-label="'사진 ' + ${stat.count}"
            >
              <img th:src="${image.imageUrl}" alt="" />
            </button>
          </div>
          <p
                  class="market-detail-v2__photo-count"
                  th:if="${!#lists.isEmpty(images)}"
                  th:text="'사진 ' + ${#lists.size(images)}"
          >
            사진 1
          </p>
        </div>

        <aside class="market-detail-v2__aside">
          <p class="market-detail-v2__meta">
            <span th:text="${post.category.label}">카테고리</span>
            ·
            <span
                    th:text="${post.neighborhood.emdName}"
                    th:classappend="${browsingNeighborhoodId != null and browsingNeighborhoodId == post.neighborhood.id} ? ' market-detail-v2__meta-focus' : ''"
            >동네</span
            >
            ·
            <time th:text="${@relativeTime.productMeta(post)}">등록일</time>
          </p>
          <h1 class="market-detail-v2__title" th:text="${post.title}">제목</h1>
          <p
                  class="market-detail-v2__price"
                  th:text="${post.giveaway ? '나눔' : #numbers.formatInteger(post.price, 0, 'COMMA') + '원'}"
          >
            0원
          </p>
          <p class="market-detail-v2__stats">조회 <span th:text="${post.viewCount}">0</span></p>

          <dl class="market-detail-v2__attrs">
            <div class="market-detail-v2__attr">
              <dt>거래 상태</dt>
              <dd th:text="${post.status.label}">판매중</dd>
            </div>
            <div class="market-detail-v2__attr">
              <dt>동네</dt>
              <dd th:text="${post.neighborhood.displayName}">동네</dd>
            </div>
            <div class="market-detail-v2__attr" th:if="${post.tradePlace}">
              <dt>거래 장소</dt>
              <dd th:text="${post.tradePlace}">장소</dd>
            </div>
          </dl>

          <div class="market-detail-v2__cta">
            <form
                    sec:authorize="isAuthenticated()"
                    th:if="${currentMember != null && currentMember.id != post.seller.id}"
                    th:action="@{/market/favorite/{id}(id=${post.id})}"
                    method="post"
                    class="market-detail-v2__cta-form"
            >
              <input type="hidden" name="redirect" th:value="${currentRedirect}" />
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
              <button
                      type="submit"
                      class="btn secondary market-detail-v2__favorite"
                      th:classappend="${isFavorited} ? ' is-favorited' : ''"
                      th:text="${isFavorited} ? '♥ 찜됨' : '♡ 찜하기'"
              >
                ♡ 찜하기
              </button>
            </form>
            <a
                    sec:authorize="isAnonymous()"
                    class="btn secondary market-detail-v2__favorite"
                    th:href="@{/member/login}"
            >♡ 찜하기</a
            >
            <form
                    th:if="${currentMember != null && currentMember.id != post.seller.id}"
                    th:action="@{/trade/request/{id}(id=${post.id})}"
                    method="post"
                    class="market-detail-v2__cta-form"
            >
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
              <button class="btn" type="submit">거래 요청</button>
            </form>
            <form
                    th:if="${currentMember != null && currentMember.id != post.seller.id}"
                    th:action="@{/chat/start/{id}(id=${post.id})}"
                    method="post"
                    class="market-detail-v2__cta-form"
            >
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
              <button class="btn secondary" type="submit">채팅하기</button>
            </form>
            <a
                    class="btn secondary"
                    th:if="${currentMember != null && currentMember.id == post.seller.id}"
                    th:href="@{/market/edit/{id}(id=${post.id})}"
            >수정</a
            >
            <form
                    th:if="${canBump}"
                    th:action="@{/market/bump/{id}(id=${post.id})}"
                    method="post"
                    class="market-detail-v2__cta-form"
            >
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
              <button class="btn secondary" type="submit">끌올</button>
            </form>
            <p
                    class="muted market-detail-v2__bump-hint"
                    th:if="${currentMember != null && currentMember.id == post.seller.id && !canBump}"
                    th:text="'끌올은 ' + ${bumpCooldownHours} + '시간 후에 다시 할 수 있습니다.'"
            ></p>
            <a
                    class="btn danger"
                    th:if="${currentMember != null && currentMember.id != post.seller.id}"
                    th:href="@{/reports/product_post/{id}(id=${post.id})}"
            >신고</a
            >
          </div>

          <form
                  th:if="${currentMember != null && currentMember.id == post.seller.id}"
                  class="market-detail-v2__seller-actions"
                  th:action="@{/market/status/{id}(id=${post.id})}"
                  method="post"
          >
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <select name="status" class="market-detail-v2__status-select">
              <option
                      th:each="s : ${T(com.study.neighbortrade.domain.product.ProductStatus).values()}"
                      th:value="${s}"
                      th:text="${s.label}"
                      th:selected="${s == post.status}"
              ></option>
            </select>
            <button class="btn secondary" type="submit">상태 변경</button>
          </form>

          <section class="market-detail-v2__seller">
            <h2 class="market-detail-v2__seller-title">판매자</h2>
            <p class="market-detail-v2__seller-name" th:text="${post.seller.nickname}">판매자</p>
            <p class="market-detail-v2__seller-manner">
              매너온도
              <strong th:text="${post.seller.mannerScore} + ' °C'">40.0 °C</strong>
            </p>
          </section>
        </aside>
      </div>

      <section class="market-detail-v2__content">
        <h2 class="market-detail-v2__content-title">상품 설명</h2>
        <p class="market-detail-v2__content-body" th:text="${post.content}">설명</p>
      </section>
    </article>
  </div>
</div>

<div th:replace="~{fragments/market-detail-mobile :: market-detail-mobile}"></div>

<script>
  (function () {
    var form = document.getElementById("market-search-band-form");
    if (form) {
      form.addEventListener("submit", function () {
        var cat = form.querySelector('[name="category"]');
        if (cat && !cat.value) cat.disabled = true;
      });
    }
    document.querySelectorAll(".market-detail-v2__thumb").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var main = document.getElementById("detail-main-image");
        if (!main) return;
        main.src = btn.getAttribute("data-src");
        document.querySelectorAll(".market-detail-v2__thumb").forEach(function (b) {
          b.classList.remove("is-active");
        });
        btn.classList.add("is-active");
      });
    });
    document.querySelectorAll(".market-detail-mobile__thumb").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var main = document.getElementById("detail-mobile-main-image");
        if (!main) return;
        main.src = btn.getAttribute("data-src");
        document.querySelectorAll(".market-detail-mobile__thumb").forEach(function (b) {
          b.classList.remove("is-active");
        });
        btn.classList.add("is-active");
      });
    });
  })();
</script>
</body>
</html>
