<!DOCTYPE html>
<html
        lang="ko"
        xmlns:th="http://www.thymeleaf.org"
        th:replace="~{fragments/admin-layout :: layout('동네 관리', ~{::admin-page-root})}"
>
<body>
<div th:fragment="admin-page-root" class="admin-page-root container">
  <h1>동네 관리</h1>
  <div class="list">
    <div class="row" th:each="n : ${neighborhoods}">
      <span th:text="${n.displayName}"></span>
      <small th:text="${n.centerLatitude} + ', ' + ${n.centerLongitude}"></small>
    </div>
  </div>
</div>
</body>
</html>
