<!DOCTYPE html>
<html
        lang="ko"
        xmlns:th="http://www.thymeleaf.org"
        th:replace="~{fragments/admin-layout :: layout('관리자 대시보드', ~{::admin-page-root})}"
>
<body>
<div th:fragment="admin-page-root" class="admin-page-root container">
  <h1>관리자 대시보드</h1>
  <div class="admin-stats">
    <div class="admin-stat-card">회원 <b th:text="${memberCount}">0</b></div>
    <div class="admin-stat-card">판매글 <b th:text="${postCount}">0</b></div>
    <div class="admin-stat-card">거래 <b th:text="${tradeCount}">0</b></div>
    <div class="admin-stat-card">동네생활 <b th:text="${communityCount}">0</b></div>
    <div class="admin-stat-card">신고 <b th:text="${reportCount}">0</b></div>
  </div>
</div>
</body>
</html>
