<!DOCTYPE html>
<html
        lang="ko"
        xmlns:th="http://www.thymeleaf.org"
        th:replace="~{fragments/admin-layout :: layout('판매글 관리', ~{::admin-page-root})}"
>
<body>
<div th:fragment="admin-page-root" class="admin-page-root container">
  <h1>판매글 관리</h1>
  <div class="list admin-post-list">
    <div class="row" th:each="post : ${page.content}">
      <span th:text="${post.title} + ' / ' + ${post.seller.nickname}"></span>
      <b th:text="${post.status.label}"></b>
      <form th:action="@{/admin/posts/hide/{id}(id=${post.id})}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <button class="btn danger" type="submit">숨김</button>
      </form>
    </div>
  </div>
</div>
</body>
</html>
