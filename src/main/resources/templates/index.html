<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>NeighborTrade</title>
    <link rel="stylesheet" th:href="@{/css/common.css}" />
  </head>
  <body>
    <div th:replace="~{fragments/header :: header}"></div>
    <main class="container hero">
      <h1>우리 동네 이웃과 안전하게 직거래하세요</h1>
      <p>
        GPS 기반 동네 인증, 거래 후기, 매너 점수로 신뢰를 쌓는 웹 중고거래
        서비스입니다.
      </p>
      <div class="actions">
        <a class="btn" th:href="@{/location/select}">동네 인증하기</a
        ><a class="btn secondary" th:href="@{/market/list}">중고거래 보기</a>
      </div>
      <h2>최근 판매글</h2>
      <div class="grid">
        <a
          class="card"
          th:each="post : ${page.content}"
          th:href="@{/market/detail/{id}(id=${post.id})}"
          ><img th:src="${post.displayImageUrl}" alt="상품" /><b
            th:text="${post.title}"
            >제목</b
          ><span
            th:text="${post.giveaway ? '나눔' : #numbers.formatInteger(post.price, 0, 'COMMA') + '원'}"
            >가격</span
          ><small
            th:text="${post.neighborhood.emdName} + ' · ' + ${post.status.label}"
            >동네</small
          ></a
        >
      </div>
    </main>
  </body>
</html>
