<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>인증 결과</title>
    <link rel="stylesheet" th:href="@{/css/common.css}" />
  </head>
  <body>
    <div th:replace="~{fragments/header :: header}"></div>
    <main class="container narrow">
      <h1>동네 인증 결과</h1>
      <div th:if="${verified}">
        <p class="success">동네 인증이 완료되었습니다.</p>
        <a class="btn" th:href="@{/market/form}">판매글 작성</a>
      </div>
      <div th:unless="${verified}">
        <p class="error">현재 위치가 선택한 동네와 다릅니다.</p>
        <a class="btn" th:href="@{/location/select}">다시 인증</a>
      </div>
    </main>
  </body>
</html>
