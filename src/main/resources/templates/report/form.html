<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>신고하기</title>
    <link rel="stylesheet" th:href="@{/css/common.css}" />
  </head>
  <body>
    <div th:replace="~{fragments/header :: header}"></div>
    <main class="container narrow">
      <h1>신고하기</h1>
      <p class="muted" th:text="'신고 대상: ' + ${targetType.label} + ' #' + ${targetId}"></p>
      <form th:action="@{/reports/{type}/{id}(type=${targetType.name().toLowerCase()}, id=${targetId})}" th:object="${reportRequestDto}" method="post" class="form">
        <input th:field="*{reason}" placeholder="신고 사유" />
        <textarea th:field="*{detail}" placeholder="상세 내용을 입력하세요"></textarea>
        <button class="btn danger" type="submit">신고 접수</button>
      </form>
    </main>
  </body>
</html>
